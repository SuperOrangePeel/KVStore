# KVS Server Configuration

[server]
# 需要支持rdma的网卡ip
bind_ip = "172.16.135.130"
port = 2000
# repl_backlog_size = 1048576
# io_uring_entries = 1024

# max_tcp_connections = 1024
# tcp_recv_buf_size = 1048576
# tcp_send_buf_size = 1048576

# debug, info, warn, error
# log_level = "debug" 
log_level = "info"


[persistence]
aof_enabled = true
aof_path = "kvstore.aof"
rdb_path = "dump.rdb"
# 0: no, 1: everysec
aof_fsync_policy = 1
# 0: async_iouring, 1: sync_buffered
aof_write_mode = 1
# 多少次写操作后触发一次 RDB 快照，默认 100000 次
rdb_policy = -1

[replication]
# 如果是 Slave，取消注释下面两行
# master_ip = "172.16.135.130"
# master_port = 6380

# 0: normal SYNC, 1: eBPF forwarder write-only mode
# slave_mode = 0 

# 如果是 Master，取消注释下面一行
max_slave_count = 512


[rdma]
rdma_port = 2001
rdma_max_chunk_size = 62914560
